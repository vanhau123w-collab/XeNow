<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - DrivEasy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-3">
            <div style="font-size:3rem">🚗</div>
            <h2>Đăng nhập DrivEasy</h2>
            <p class="subtitle">Nhập email (khách hàng) hoặc username (quản lý)</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">Email / Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" placeholder="email@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem">
                🔐 Đăng nhập
            </button>
        </form>
        <p class="text-center mt-2" style="font-size:0.9rem">
            Chưa có tài khoản? <a th:href="@{/register}" style="color:var(--primary)">Đăng ký ngay</a>
        </p>
    </div>
</div>
</body>
</html>
