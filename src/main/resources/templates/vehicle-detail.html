<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${vehicle.brand + ' ' + vehicle.model + ' - DrivEasy'}">Chi tiết xe</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}"><span>🚗</span> DrivEasy</a>
    <ul class="navbar-nav">
        <li><a class="nav-link" th:href="@{/}">← Tất cả xe</a></li>
        <li sec:authorize="isAuthenticated()">
            <a class="nav-link" th:href="@{/bookings/my-bookings}">Đơn của tôi</a>
        </li>
        <li sec:authorize="isAnonymous()">
            <a class="btn btn-primary btn-sm" th:href="@{/login}">Đăng nhập</a>
        </li>
    </ul>
</nav>

<div class="container mt-4" style="max-width:900px">
    <div class="card">
        <div class="card-body">
            <div class="d-flex" style="gap:2rem;flex-wrap:wrap">
                <!-- Vehicle image placeholder -->
                <div style="width:300px;height:250px;background:linear-gradient(135deg,#DBEAFE,#EDE9FE);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:6rem;flex-shrink:0;">
                    🚗
                </div>
                <div style="flex:1;min-width:250px">
                    <span class="badge badge-success mb-1" th:text="${vehicle.type.typeName}"></span>
                    <h1 style="font-size:1.8rem;font-weight:700;margin:0.5rem 0" th:text="${vehicle.brand + ' ' + vehicle.model}"></h1>
                    <div class="text-muted mb-2">
                        🏷 Biển số: <strong th:text="${vehicle.licensePlate}"></strong>
                        &nbsp;|&nbsp;
                        📅 Năm: <span th:text="${vehicle.yearMade}"></span>
                        <span th:if="${vehicle.color}">&nbsp;|&nbsp; 🎨 <span th:text="${vehicle.color}"></span></span>
                    </div>
                    <div th:if="${vehicle.location}" class="text-muted mb-2">
                        📍 Chi nhánh: <span th:text="${vehicle.location.address + ', ' + vehicle.location.city}"></span>
                    </div>
                    <hr>
                    <div class="price-tag" style="font-size:1.5rem;margin:1rem 0" th:text="${#numbers.formatDecimal(vehicle.dailyRate, 0, 'COMMA', 0, 'POINT') + ' ₫ / ngày'}"></div>
                    <div th:if="${vehicle.depositAmount}" class="text-muted mb-3">
                        💰 Đặt cọc: <span th:text="${#numbers.formatDecimal(vehicle.depositAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                    </div>

                    <div sec:authorize="isAuthenticated()">
                        <a th:href="@{/bookings/create/{id}(id=${vehicle.vehicleId})}"
                           class="btn btn-primary" style="font-size:1.1rem;padding:0.75rem 2rem">
                            📋 Đặt xe ngay
                        </a>
                    </div>
                    <div sec:authorize="isAnonymous()">
                        <a th:href="@{/login}" class="btn btn-primary" style="font-size:1rem;padding:0.75rem 2rem">
                            🔐 Đăng nhập để đặt xe
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${vehicle.notes}" class="mt-3">
                <strong>📝 Ghi chú:</strong>
                <p class="text-muted" th:text="${vehicle.notes}"></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
