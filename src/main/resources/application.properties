# Server
server.port=8080
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/XeNow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# App Name
spring.application.name=Vehicle Rental Management
# FPT.AI eKYC API
fpt.ai.api.key=${FPT_AI_API_KEY}

# File Upload Limits
# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=604800000

# File Upload Configuration
app.upload.base-dir=uploads
app.upload.max-size-bytes=5242880
app.upload.allowed-folders=avatars,vehicles

# Multipart config
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Static resources serving from local directory
spring.web.resources.static-locations=file:${app.upload.base-dir}/,classpath:/static/
